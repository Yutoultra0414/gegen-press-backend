<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選手プロフィール - Gegen Press!</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Hiragino Sans', 'Meiryo', 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

        header {
            background: linear-gradient(135deg, #fff 0%, #f9f9f9 100%);
            border-bottom: 3px solid #e63946;
            padding: 14px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { display: flex; align-items: center; text-decoration: none; }
        .header-nav { display: flex; gap: 18px; align-items: center; }
        .nav-link { color: #333; text-decoration: none; font-weight: 600; font-size: 14px; }
        .nav-link:hover { color: #e63946; }
        .back-button { background: #e63946; color: #fff; border: none; padding: 9px 18px; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer; text-decoration: none; }

        .profile-header {
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            padding: 22px 40px;
            position: relative;
            overflow: hidden;
        }
        .profile-header::before {
            content: ''; position: absolute; top: -50px; right: -100px;
            width: 300px; height: 300px; background-color: rgba(255,255,255,0.08); border-radius: 50%;
        }
        .profile-content {
            max-width: 900px; margin: 0 auto; display: grid;
            grid-template-columns: 100px 1fr; gap: 18px; align-items: center;
            position: relative; z-index: 1;
        }
        .profile-avatar {
            width: 100px; height: 100px; border-radius: 8px;
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 900; color: #fff;
            border: 3px solid rgba(255,255,255,0.85); overflow: hidden; flex-shrink: 0;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info h1 { font-size: 22px; color: #fff; margin-bottom: 3px; }
        .profile-info .subtitle { font-size: 13px; color: #fff; opacity: 0.95; margin-bottom: 10px; }
        .profile-meta { display: flex; gap: 20px; margin-bottom: 4px; flex-wrap: wrap; }
        .meta-item { display: flex; flex-direction: column; }
        .meta-value { font-size: 15px; font-weight: bold; color: #fff; }
        .meta-label { font-size: 10px; color: #fff; opacity: 0.85; text-transform: uppercase; }

        .content-wrap { max-width: 900px; margin: 0 auto; padding: 20px 40px; }
        .card { background: #fff; border-radius: 8px; padding: 18px 20px; margin-bottom: 16px; border: 1px solid #eee; }
        .card h2 { font-size: 14px; color: #e63946; margin-bottom: 10px; border-left: 4px solid #e63946; padding-left: 8px; }
        .card p { font-size: 13px; line-height: 1.8; color: #444; }

        .transfer-box { display: flex; align-items: center; gap: 14px; font-size: 13px; }
        .transfer-club { font-weight: bold; color: #333; }
        .transfer-arrow { color: #e63946; font-weight: bold; }
        .transfer-badge {
            font-size: 11px; font-weight: bold; padding: 3px 10px; border-radius: 4px;
        }
        .transfer-badge.rumor { background: #fff3cd; color: #856404; }
        .transfer-badge.completed { background: #d4edda; color: #155724; }

        #setIconBtn {
            display: none; background: rgba(255,255,255,0.9); color: #e63946;
            border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px;
            font-weight: bold; cursor: pointer; margin-top: 6px;
        }

        @media (max-width: 768px) {
            header { padding: 8px 14px; }
            .logo img { height: 26px !important; }
            .nav-link, .back-button { font-size: 12px !important; padding: 4px 8px !important; }
            .profile-header { padding: 16px 20px; }
            .profile-content { grid-template-columns: 72px 1fr; gap: 12px; }
            .profile-avatar { width: 72px; height: 72px; font-size: 24px; }
            .profile-info h1 { font-size: 17px; }
            .content-wrap { padding: 16px; }
        }
    
        /* ===== 新コンパクト共通ヘッダー（ESPN風・全ページ共通） ===== */
        header.gp-header {
            background: #fff !important;
            border-bottom: 3px solid #e63946 !important;
            padding: 6px 24px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: flex-start !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important;
            gap: 26px !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06) !important;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .gp-logo { display: block; flex-shrink: 0; }
        .gp-logo img { height: 34px !important; width: auto; display: block; }
        .gp-nav {
            display: flex;
            align-items: stretch;
            gap: 22px;
            flex: 1;
            min-width: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .gp-nav::-webkit-scrollbar { display: none; }
        .gp-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            line-height: 1.15;
            padding: 6px 2px;
            white-space: nowrap;
        }
        .gp-en {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.5px;
            color: #111;
            text-transform: uppercase;
        }
        .gp-jp {
            font-size: 10px;
            color: #888;
            font-weight: 600;
            margin-top: 1px;
        }
        .gp-nav-item:hover .gp-en { color: #e63946; }
        .gp-nav-item.active { box-shadow: inset 0 -3px 0 #e63946; }
        .gp-nav-item.active .gp-en { color: #e63946; }
        .gp-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .gp-mypage {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #e63946;
            color: #fff;
            text-decoration: none;
            padding: 5px 14px;
            border-radius: 5px;
            line-height: 1.15;
            white-space: nowrap;
        }
        .gp-mypage .gp-en { color: #fff; font-size: 12px; }
        .gp-mypage .gp-jp { color: rgba(255,255,255,0.85); }
        .gp-mypage:hover { background: #ff6b6b; }
        header.gp-header .search-bar {
            width: 150px !important;
            margin: 0 !important;
            padding: 6px 12px !important;
            font-size: 13px !important;
        }
        /* 薄いページ名ストリップ */
        .gp-page-strip {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 9px 24px;
        }
        .gp-page-strip h1 {
            font-size: 16px;
            font-weight: 900;
            color: #333;
            max-width: 1280px;
            margin: 0 auto;
            letter-spacing: 0.5px;
        }
        @media (max-width: 768px) {
            header.gp-header {
                padding: 4px 10px !important;
                gap: 12px !important;
                flex-wrap: nowrap !important;
            }
            .gp-logo img { height: 26px !important; }
            .gp-nav { gap: 14px; }
            .gp-en { font-size: 12px; }
            .gp-jp { font-size: 9px; }
            .gp-mypage { padding: 4px 10px; }
            .gp-mypage .gp-en { font-size: 10.5px; }
            header.gp-header .search-bar { display: none !important; }
            .gp-page-strip { padding: 8px 14px; }
            .gp-page-strip h1 { font-size: 14.5px; }
        }
    
    </style>
</head>
<body>
    <header class="gp-header">
        <a href="gegen_press_top.html" class="gp-logo"><img src="logo.png" alt="Gegen Press!"></a>
        <nav class="gp-nav">
            <a class="gp-nav-item" href="gegen_press_top.html"><span class="gp-en">HOME</span><span class="gp-jp">ホーム</span></a>
            <a class="gp-nav-item" href="gegen_press_category.html"><span class="gp-en">NEWS</span><span class="gp-jp">ニュース一覧</span></a>
            <a class="gp-nav-item" href="gegen_press_ranking.html"><span class="gp-en">RANKING</span><span class="gp-jp">ランキング</span></a>
            <a class="gp-nav-item" href="gegen_press_players.html"><span class="gp-en">PLAYERS</span><span class="gp-jp">選手一覧</span></a>
            <a class="gp-nav-item" href="gegen_press_add_reporter.html"><span class="gp-en">ADD REPORTER</span><span class="gp-jp">記者を追加</span></a>
            <a class="gp-nav-item" href="gegen_press_write_article.html"><span class="gp-en">POST</span><span class="gp-jp">ニュースを投稿</span></a>
        </nav>
        <div class="gp-actions">
            <a href="gegen_press_user_profile.html" class="gp-mypage"><span class="gp-en">MY PAGE</span><span class="gp-jp">マイページ</span></a>
        </div>
    </header>

    <section class="profile-header">
        <div class="profile-content">
            <div style="display:flex; flex-direction:column; align-items:center;">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <button id="setIconBtn">アイコンを設定</button>
                <input type="file" id="iconFileInput" accept="image/*" style="display:none;">
            </div>
            <div class="profile-info">
                <h1 id="playerName">読み込み中...</h1>
                <p class="subtitle" id="playerClub"></p>
                <div class="profile-meta">
                    <div class="meta-item"><div class="meta-value" id="metaPosition">-</div><div class="meta-label">ポジション</div></div>
                    <div class="meta-item"><div class="meta-value" id="metaNationality">-</div><div class="meta-label">国籍</div></div>
                </div>
            </div>
        </div>
    </section>

    <div class="content-wrap">
        <div class="card" id="transferCard" style="display:none;">
            <h2>移籍情報</h2>
            <div class="transfer-box" id="transferBox"></div>
        </div>

        <div class="card">
            <h2>選手紹介</h2>
            <p id="playerBio">-</p>
        </div>
    </div>

    <script src="api-client.js" onerror="console.warn('api-client.js 未読込')"></script>
    <script>
        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function getInitials(name) {
            if (!name) return '?';
            const parts = String(name).trim().split(/\s+/).filter(p => /[A-Za-z0-9\u00C0-\u024F\u3040-\u30FF\u4E00-\u9FFF]/.test(p.charAt(0)));
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            return String(name).trim().substring(0, 2).toUpperCase();
        }
        const PALETTE = [
            ['#e63946', '#a4161a'], ['#1d3557', '#14213d'], ['#2a9d8f', '#1f7a6f'],
            ['#e76f51', '#c44a30'], ['#6a4c93', '#4e3470'], ['#457b9d', '#2f5a73']
        ];
        function colorFor(name) {
            let h = 0; const s = name || '';
            for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
            return PALETTE[h % PALETTE.length];
        }

        const playerId = new URLSearchParams(window.location.search).get('id');
        let currentPlayer = null;

        function renderAvatar(p) {
            const el = document.getElementById('profileAvatar');
            if (p.profileImage) {
                el.innerHTML = '<img src="' + p.profileImage + '" alt="">';
                el.style.background = 'none';
            } else {
                el.textContent = getInitials(p.name);
                const g = colorFor(p.name);
                el.style.background = 'linear-gradient(135deg, ' + g[0] + ' 0%, ' + g[1] + ' 100%)';
            }
        }

        async function loadPlayer() {
            if (typeof GegenPressAPI === 'undefined' || !playerId) {
                document.getElementById('playerName').textContent = '選手が見つかりません';
                return;
            }
            const res = await GegenPressAPI.players.getById(playerId);
            if (!res || !res.success) {
                document.getElementById('playerName').textContent = '選手が見つかりません';
                return;
            }
            const p = res.player;
            currentPlayer = p;
            document.title = p.name + ' - Gegen Press!';
            document.getElementById('playerName').textContent = p.name;
            document.getElementById('playerClub').textContent = p.currentClub || '所属クラブ未設定';
            document.getElementById('metaPosition').textContent = p.position || '-';
            document.getElementById('metaNationality').textContent = p.nationality || '-';
            document.getElementById('playerBio').textContent = p.bio || 'まだ紹介文が登録されていません。';
            renderAvatar(p);

            if (p.transferStatus === 'rumor' || p.transferStatus === 'completed') {
                document.getElementById('transferCard').style.display = 'block';
                const badge = p.transferStatus === 'rumor'
                    ? '<span class="transfer-badge rumor">移籍の噂</span>'
                    : '<span class="transfer-badge completed">移籍決定</span>';
                document.getElementById('transferBox').innerHTML =
                    badge +
                    '<span class="transfer-club">' + esc(p.fromClub || '不明') + '</span>' +
                    '<span class="transfer-arrow">→</span>' +
                    '<span class="transfer-club">' + esc(p.toClub || '不明') + '</span>' +
                    (p.transferFee ? '<span style="color:#888;">（' + esc(p.transferFee) + '）</span>' : '');
            }

            // アイコン設定ボタン（ログイン中のみ表示。保存可否はサーバー側ルールが判定）
            let user = null;
            try { user = await GegenPressAPI._currentUser(); } catch (e) {}
            if (user) document.getElementById('setIconBtn').style.display = 'inline-block';
        }

        function fileToSquareJpeg(file, size) {
            return new Promise(function (resolve, reject) {
                const reader = new FileReader();
                reader.onerror = () => reject(new Error('ファイルを読み込めませんでした'));
                reader.onload = function () {
                    const img = new Image();
                    img.onerror = () => reject(new Error('画像として読み込めませんでした'));
                    img.onload = function () {
                        try {
                            const canvas = document.createElement('canvas');
                            canvas.width = size; canvas.height = size;
                            const ctx = canvas.getContext('2d');
                            const s = Math.min(img.width, img.height);
                            ctx.drawImage(img, (img.width - s) / 2, (img.height - s) / 2, s, s, 0, 0, size, size);
                            let q = 0.85;
                            let out = canvas.toDataURL('image/jpeg', q);
                            while (out.length > 140000 && q > 0.4) { q -= 0.1; out = canvas.toDataURL('image/jpeg', q); }
                            if (out.length > 200000) { reject(new Error('画像が大きすぎます')); return; }
                            resolve(out);
                        } catch (e) { reject(e); }
                    };
                    img.src = reader.result;
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('setIconBtn').addEventListener('click', () => {
            document.getElementById('iconFileInput').click();
        });
        document.getElementById('iconFileInput').addEventListener('change', async function () {
            const file = this.files && this.files[0];
            this.value = '';
            if (!file || !currentPlayer) return;
            if (!file.type || file.type.indexOf('image/') !== 0) { alert('画像ファイルを選択してください'); return; }
            const btn = document.getElementById('setIconBtn');
            btn.disabled = true; btn.textContent = '処理中...';
            try {
                const dataUrl = await fileToSquareJpeg(file, 256);
                const res = await GegenPressAPI.players.update(currentPlayer.id, { profileImage: dataUrl });
                if (res && res.success) {
                    currentPlayer.profileImage = dataUrl;
                    renderAvatar(currentPlayer);
                    alert('アイコンを設定しました');
                } else {
                    alert((res && res.message && String(res.message).indexOf('permission') >= 0)
                        ? 'この選手のアイコンを変更する権限がありません（追加した本人、または管理者のみ変更できます）'
                        : ((res && res.message) || 'アイコンの保存に失敗しました'));
                }
            } catch (e) {
                alert('アイコンの設定中にエラーが発生しました: ' + (e.message || e));
            }
            btn.disabled = false; btn.textContent = 'アイコンを設定';
        });

        loadPlayer();
    </script>
</body>
</html>
