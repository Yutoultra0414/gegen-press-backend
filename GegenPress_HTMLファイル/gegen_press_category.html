<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カテゴリ一覧 | Gegen Press!</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        /* ヘッダー */
        header {
            background: linear-gradient(135deg, #fff 0%, #f9f9f9 100%);
            border-bottom: 3px solid #e63946;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(230, 57, 70, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 36px;
            font-weight: 900;
            color: #e63946;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .header-nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-link {
            color: #333;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #e63946;
        }

        .back-button {
            background-color: #e63946;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background-color: #ff6b6b;
        }

        /* ページタイトル */
        .page-title-section {
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            padding: 60px 40px;
            position: relative;
            overflow: hidden;
        }

        .page-title-section::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -100px;
            width: 400px;
            height: 400px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .page-title-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .page-title {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: 2px;
            color: #fff;
        }

        .page-subtitle {
            font-size: 18px;
            opacity: 0.9;
            color: #fff;
        }

        /* コンテナ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 40px;
        }

        /* サイドバー - カテゴリ */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .category-box {
            background: linear-gradient(135deg, #fff 0%, #f9f9f9 100%);
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
        }

        .category-box h3 {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #e63946;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .category-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .category-item {
            padding: 10px 12px;
            background-color: transparent;
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .category-item:hover {
            border-color: #e63946;
            color: #e63946;
            background-color: rgba(230, 57, 70, 0.05);
        }

        .category-item.active {
            background-color: #e63946;
            border-color: #e63946;
            color: #fff;
        }

        /* メインコンテンツ */
        .main-content {
            display: flex;
            flex-direction: column;
        }

        /* カテゴリヘッダー */
        .category-header {
            margin-bottom: 40px;
            padding-bottom: 25px;
            border-bottom: 2px solid #ddd;
        }

        .category-name {
            font-size: 32px;
            font-weight: 900;
            color: #e63946;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .category-description {
            font-size: 14px;
            color: #999;
            line-height: 1.6;
        }

        .category-stats {
            display: flex;
            gap: 25px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #e63946;
        }

        .stat-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ソート・フィルター */
        .sort-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
            flex-wrap: wrap;
            gap: 15px;
        }

        .sort-label {
            font-size: 13px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sort-select {
            background-color: #fff;
            border: 2px solid #ddd;
            color: #333;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .sort-select:hover {
            border-color: #e63946;
        }

        .sort-select:focus {
            outline: none;
            border-color: #e63946;
        }

        /* 記事一覧 */
        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .article-card {
            background: linear-gradient(135deg, #fff 0%, #f9f9f9 100%);
            border: 2px solid #ddd;
            border-left: 4px solid #e63946;
            border-radius: 6px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .article-card:hover {
            border-color: #e63946;
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.1);
            transform: translateX(5px);
        }

        .article-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .article-title {
            font-size: 18px;
            font-weight: bold;
            color: #000;
            margin-bottom: 8px;
        }

        .article-label {
            background-color: #e63946;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .article-author {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #333;
        }

        .author-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
        }

        .article-time {
            font-size: 12px;
            color: #999;
        }

        .article-score {
            background-color: #e63946;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        .article-description {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .article-footer {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #ddd;
            padding-top: 12px;
        }

        /* ページネーション */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pagination-btn {
            background-color: #fff;
            color: #333;
            border: 2px solid #ddd;
            padding: 12px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .pagination-btn:hover {
            border-color: #e63946;
            color: #e63946;
        }

        .pagination-btn.active {
            background-color: #e63946;
            border-color: #e63946;
            color: #fff;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* レスポンシブ */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .category-box {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .category-box h3 {
                margin-bottom: 0;
                min-width: 100px;
            }

            .category-list {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .category-item {
                flex-shrink: 0;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }

            .logo {
                font-size: 24px;
            }

            .page-title-section {
                padding: 40px 20px;
            }

            .page-title {
                font-size: 32px;
            }

            .container {
                padding: 40px 20px;
            }

            .category-name {
                font-size: 24px;
            }

            .article-header {
                flex-direction: column;
            }

            .article-meta {
                gap: 10px;
            }

            .sort-section {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <a href="gegen_press_top.html" class="logo"><img src="logo.png" alt="Gegen Press!" style="height:46px;width:auto;display:block;"></a>
        <div class="header-nav">
            <a href="gegen_press_top.html" class="nav-link">ホーム</a>
            <a href="#" class="nav-link">カテゴリ</a>
            <a href="gegen_press_ranking.html" class="nav-link">ランキング</a>
            <a href="gegen_press_top.html"><button class="back-button">トップに戻る</button></a>
        </div>
    </header>

    <!-- ページタイトル -->
    <section class="page-title-section">
        <div class="page-title-content">
            <h1 class="page-title">カテゴリ一覧</h1>
            <p class="page-subtitle">専門分野別に記事を分類。あなたに必要な情報を見つけよう</p>
        </div>
    </section>

    <!-- メインコンテンツ -->
    <div class="container">
        <!-- サイドバー -->
        <aside class="sidebar">
            <div class="category-box">
                <h3>カテゴリ選択</h3>
                <div class="category-list">
                    <button class="category-item active" data-category="all">すべて</button>
                    <button class="category-item" data-category="移籍情報">移籍情報</button>
                    <button class="category-item" data-category="プレミアリーグ">プレミアリーグ</button>
                    <button class="category-item" data-category="ラリーガ">ラリーガ</button>
                    <button class="category-item" data-category="セリエA">セリエA</button>
                    <button class="category-item" data-category="リーグアン">リーグアン</button>
                    <button class="category-item" data-category="ブンデスリーガ">ブンデスリーガ</button>
                </div>
            </div>
        </aside>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <!-- カテゴリヘッダー -->
            <div class="category-header">
                <div class="category-name" id="catName">すべて</div>
                <p class="category-description" id="catDesc">
                    全カテゴリの記事を表示しています。
                </p>
                <div class="category-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="statCount">0</div>
                        <div class="stat-label">記事数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statTrust">-</div>
                        <div class="stat-label">平均信ぴょう性</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statViews">0</div>
                        <div class="stat-label">総閲覧数</div>
                    </div>
                </div>
            </div>

            <!-- ソート -->
            <div class="sort-section">
                <span class="sort-label">並び替え:</span>
                <select class="sort-select" id="sortSelect">
                    <option>最新順</option>
                    <option>関連度順</option>
                    <option>信頼度が高い順</option>
                    <option>人気順</option>
                </select>
            </div>

            <!-- 記事一覧 -->
            <div class="articles-list" id="articlesList">
                <p style="color:#999; padding:20px 0;">読み込み中...</p>
            </div>

            <!-- ページネーション -->
            <div class="pagination">
                <button class="pagination-btn" disabled>前へ</button>
                <button class="pagination-btn active">1</button>
                <button class="pagination-btn">2</button>
                <button class="pagination-btn">3</button>
                <button class="pagination-btn">4</button>
                <button class="pagination-btn">5</button>
                <button class="pagination-btn">次へ</button>
            </div>
        </main>
    </div>

    <script src="api-client.js" onerror="console.warn('api-client.js 未読込')"></script>
    <script>
        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function getInitials(name) {
            if (!name) return '?';
            const parts = String(name).trim().split(/\s+/).filter(p => /[A-Za-z0-9\u00C0-\u024F]/.test(p.charAt(0)));
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            const one = parts[0] || String(name).trim();
            return one.substring(0, 2).toUpperCase();
        }
        const AVATAR_PALETTE = [
            ['#e63946', '#a4161a'], ['#1d3557', '#14213d'], ['#2a9d8f', '#1f7a6f'],
            ['#e76f51', '#c44a30'], ['#6a4c93', '#4e3470'], ['#457b9d', '#2f5a73'],
            ['#588157', '#3a5a3a'], ['#bc6c25', '#8a4e16']
        ];
        function avatarColor(name) {
            let h = 0; const s = name || '';
            for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
            return AVATAR_PALETTE[h % AVATAR_PALETTE.length];
        }
        function avatarStyle(name) {
            const g = avatarColor(name);
            return 'background: linear-gradient(135deg, ' + g[0] + ' 0%, ' + g[1] + ' 100%); color:#fff;';
        }
        function fmtDate(ts) {
            try {
                const d = ts && ts.toDate ? ts.toDate() : (ts ? new Date(ts) : null);
                if (!d || isNaN(d)) return '';
                return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日';
            } catch (e) { return ''; }
        }

        const CATEGORY_DESC = {
            'all': '全カテゴリの記事を表示しています。',
            '移籍情報': '世界中のサッカークラブの選手移籍に関する最新ニュース。契約交渉、移籍金、選手のコメントなど、移籍に関するすべての情報をお届けします。',
            'プレミアリーグ': 'イングランド・プレミアリーグの試合結果、順位争い、クラブの最新動向をお届けします。',
            'ラリーガ': 'スペイン・ラリーガの最新情報。レアル・マドリー、バルセロナをはじめとするクラブの動向を追います。',
            'セリエA': 'イタリア・セリエAの最新情報。ユベントス、ミラン勢などの動向をお届けします。',
            'リーグアン': 'フランス・リーグアンの最新情報。PSGをはじめとするクラブの動向を追います。',
            'ブンデスリーガ': 'ドイツ・ブンデスリーガの最新情報。バイエルンなど各クラブの動向をお届けします。'
        };

        let allArticles = [];
        let currentCategory = 'all';

        const categoryButtons = document.querySelectorAll('.category-item');
        categoryButtons.forEach(btn => {
            btn.addEventListener('click', function () {
                categoryButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.getAttribute('data-category');
                renderCategory();
            });
        });

        document.getElementById('sortSelect').addEventListener('change', renderCategory);

        function sortArticles(list, mode) {
            const arr = list.slice();
            if (mode === '信頼度が高い順') arr.sort((a, b) => (b.trustScore || 0) - (a.trustScore || 0));
            else if (mode === '人気順') arr.sort((a, b) => (b.views || 0) - (a.views || 0));
            else arr.sort((a, b) => {
                const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
                const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
                return tb - ta;
            });
            return arr;
        }

        function renderCategory() {
            const listEl = document.getElementById('articlesList');
            const filtered = currentCategory === 'all'
                ? allArticles
                : allArticles.filter(a => (a.category || '') === currentCategory);
            const sorted = sortArticles(filtered, document.getElementById('sortSelect').value);

            // ヘッダー更新（実データから計算）
            document.getElementById('catName').textContent = currentCategory === 'all' ? 'すべて' : currentCategory;
            document.getElementById('catDesc').textContent = CATEGORY_DESC[currentCategory] || '';
            document.getElementById('statCount').textContent = filtered.length;
            const trustAvg = filtered.length
                ? (filtered.reduce((s, a) => s + (a.trustScore || 0), 0) / filtered.length).toFixed(1) : '-';
            document.getElementById('statTrust').textContent = trustAvg;
            document.getElementById('statViews').textContent =
                filtered.reduce((s, a) => s + (a.views || 0), 0).toLocaleString();

            if (sorted.length === 0) {
                listEl.innerHTML = '<p style="color:#999; padding:20px 0;">このカテゴリの記事はまだありません。</p>';
                return;
            }
            listEl.innerHTML = sorted.map(a => {
                const rating = (typeof a.averageRating === 'number') ? a.averageRating.toFixed(1) : '-';
                return (
                    '<div class="article-card" style="cursor:pointer;" data-id="' + esc(a.id) + '">' +
                        '<div class="article-header">' +
                            '<div>' +
                                '<div class="article-title">' + esc(a.title) + '</div>' +
                                '<div class="article-meta">' +
                                    '<div class="article-author">' +
                                        '<div class="author-avatar" style="' + avatarStyle(a.authorName) + '">' + esc(getInitials(a.authorName)) + '</div>' +
                                        '<span>' + esc(a.authorName || '') + '</span>' +
                                    '</div>' +
                                    '<span class="article-time">' + esc(fmtDate(a.createdAt)) + '</span>' +
                                '</div>' +
                            '</div>' +
                            '<div class="article-label">' + esc(a.category || '') + '</div>' +
                        '</div>' +
                        '<div class="article-description">' + esc(a.description || '') + '</div>' +
                        '<div class="article-footer">' +
                            '<span>閲覧数: ' + (a.views || 0).toLocaleString() + '</span>' +
                            '<span>評価: <strong style="color: #e63946;">' + rating + '/5.0</strong></span>' +
                        '</div>' +
                    '</div>'
                );
            }).join('');
            listEl.querySelectorAll('.article-card').forEach(el => {
                el.addEventListener('click', () => {
                    window.location.href = 'gegen_press_article_detail.html?id=' + encodeURIComponent(el.getAttribute('data-id'));
                });
            });
        }

        async function loadCategoryPage() {
            const listEl = document.getElementById('articlesList');
            const pg = document.querySelector('.pagination');
            if (pg) pg.style.display = 'none'; // 見せかけのページ送りは隠す
            if (typeof GegenPressAPI === 'undefined') {
                listEl.innerHTML = '<p style="color:#999; padding:20px 0;">記事を読み込めませんでした。</p>';
                return;
            }
            try {
                const res = await GegenPressAPI.articles.getAll();
                if (!res || !res.success) {
                    listEl.innerHTML = '<p style="color:#999; padding:20px 0;">記事の読み込みに失敗しました。</p>';
                    return;
                }
                allArticles = res.articles || [];
                // URLの ?cat= があれば初期カテゴリに反映
                const cat = new URLSearchParams(window.location.search).get('cat');
                if (cat && CATEGORY_DESC[cat]) {
                    currentCategory = cat;
                    categoryButtons.forEach(b => {
                        b.classList.toggle('active', b.getAttribute('data-category') === cat);
                    });
                }
                renderCategory();
            } catch (e) {
                listEl.innerHTML = '<p style="color:#999; padding:20px 0;">記事の読み込み中にエラーが発生しました。</p>';
            }
        }
        loadCategoryPage();
    </script>
    </script>
</body>
</html>
