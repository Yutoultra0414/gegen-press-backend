<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事を投稿 | Gegen Press!</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #fff 0%, #f9f9f9 100%);
            border-bottom: 3px solid #e63946;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(230, 57, 70, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; text-decoration: none; }
        .header-nav { display: flex; gap: 18px; align-items: center; }
        .nav-link { color: #333; text-decoration: none; font-weight: 600; font-size: 14px; }
        .nav-link:hover { color: #e63946; }
        .back-button {
            background-color: #e63946; color: #fff; border: none;
            padding: 10px 20px; border-radius: 4px; cursor: pointer;
            font-weight: bold;
        }
        .back-button:hover { background-color: #ff6b6b; }

        .page-title-section {
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            padding: 24px 40px;
            position: relative;
            overflow: hidden;
        }
        .page-title-content { max-width: 800px; margin: 0 auto; position: relative; z-index: 1; }
        .page-title { font-size: 22px; font-weight: 900; margin-bottom: 6px; letter-spacing: 1px; color: #fff; }
        .page-subtitle { font-size: 13px; opacity: 0.9; color: #fff; line-height: 1.6; }

        .container { max-width: 800px; margin: 0 auto; padding: 30px 40px; }

        .login-notice {
            background: linear-gradient(135deg, #fff3cd 0%, #ffe69c 100%);
            border: 2px solid #ffc107;
            border-left: 4px solid #ffc107;
            border-radius: 6px;
            padding: 16px 20px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #856404;
            display: none;
        }
        .login-notice a { color: #e63946; font-weight: bold; text-decoration: none; }

        .form-card {
            background: linear-gradient(135deg, #fff 0%, #f9f9f9 100%);
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 30px;
        }

        .form-group { margin-bottom: 22px; }
        .form-label {
            display: block; font-size: 13px; font-weight: bold; color: #333;
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
        }
        .required-badge {
            background-color: #e63946; color: #fff;
            font-size: 10px; padding: 2px 7px; border-radius: 3px; margin-left: 8px;
        }
        .optional-badge {
            background-color: #ccc; color: #fff;
            font-size: 10px; padding: 2px 7px; border-radius: 3px; margin-left: 8px;
        }
        .form-hint { font-size: 12px; color: #999; margin-bottom: 10px; line-height: 1.5; }

        .form-input, .form-textarea, .form-select {
            width: 100%; padding: 12px 15px; border: 2px solid #ddd; border-radius: 6px;
            font-size: 14px; font-family: inherit; color: #333; background-color: #fff;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none; border-color: #e63946; box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
        }
        .form-textarea { resize: vertical; min-height: 120px; }

        /* サムネイル */
        .thumb-drop {
            border: 2px dashed #ddd; border-radius: 8px; padding: 20px;
            text-align: center; cursor: pointer; transition: all .2s ease;
            background: #fff;
        }
        .thumb-drop:hover { border-color: #e63946; }
        .thumb-drop.has-image { padding: 0; border-style: solid; overflow: hidden; }
        .thumb-drop img { width: 100%; max-height: 220px; object-fit: cover; display: block; }
        .thumb-drop-label { color: #999; font-size: 13px; }
        .thumb-required-note { font-size: 12px; color: #e63946; margin-top: 6px; }

        /* カテゴリタグ */
        .tag-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag-option {
            background-color: #fff; border: 2px solid #ddd; color: #666;
            padding: 8px 16px; border-radius: 20px; cursor: pointer;
            font-size: 13px; font-weight: 600; user-select: none; transition: all .2s ease;
        }
        .tag-option:hover { border-color: #e63946; color: #e63946; }
        .tag-option.selected { background-color: #e63946; border-color: #e63946; color: #fff; }

        .form-actions {
            display: flex; gap: 15px; margin-top: 30px; padding-top: 24px; border-top: 2px solid #eee;
        }
        .submit-btn {
            flex: 1; background: linear-gradient(135deg, #e63946 0%, #a4161a 100%); color: #fff;
            border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold;
            font-size: 15px; text-transform: uppercase; letter-spacing: 1px;
        }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .cancel-btn {
            background-color: transparent; border: 2px solid #ddd; color: #666;
            padding: 15px 28px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px;
        }
        .cancel-btn:hover { border-color: #999; color: #333; }

        .success-message {
            display: none; background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border: 2px solid #28a745; border-radius: 10px; padding: 34px; text-align: center;
        }
        .success-message.show { display: block; }
        .success-message h2 { color: #155724; font-size: 22px; margin-bottom: 10px; }
        .success-message p { color: #155724; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
        .success-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .success-actions button {
            padding: 11px 22px; border-radius: 6px; cursor: pointer; font-weight: bold;
            font-size: 13px; border: none;
        }
        .btn-view { background-color: #e63946; color: #fff; }
        .btn-another { background-color: #fff; border: 2px solid #28a745 !important; color: #28a745; }

        @media (max-width: 768px) {
            header { flex-direction: row; flex-wrap: wrap; gap: 6px; padding: 8px 14px; }
            .logo img { height: 26px !important; }
            .header-nav { gap: 10px; }
            .nav-link, .back-button { font-size: 12px !important; padding: 4px 8px !important; }
            .page-title-section { padding: 14px 16px; }
            .page-title { font-size: 18px; }
            .container { padding: 20px 16px; }
            .form-card { padding: 18px; }
            .form-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <a href="gegen_press_top.html" class="logo"><img src="logo.png" alt="Gegen Press!" style="height:46px;width:auto;display:block;"></a>
        <div class="header-nav">
            <a href="gegen_press_top.html" class="nav-link">ホーム</a>
            <a href="gegen_press_ranking.html" class="nav-link">ランキング</a>
            <a href="gegen_press_category.html" class="nav-link">記事一覧</a>
            <a href="gegen_press_top.html"><button class="back-button">トップに戻る</button></a>
        </div>
    </header>

    <section class="page-title-section">
        <div class="page-title-content">
            <h1 class="page-title">記事を投稿</h1>
            <p class="page-subtitle">記者としての速報・分析記事を投稿できます。サムネイル画像の設定が必須です。</p>
        </div>
    </section>

    <div class="container">
        <div class="login-notice" id="loginNotice">
            記事の投稿にはログインが必要です。<a href="gegen_press_login.html">ログイン / 新規登録はこちら</a>
        </div>

        <div class="form-card" id="formCard">
            <form id="articleForm">
                <!-- サムネイル（必須） -->
                <div class="form-group">
                    <label class="form-label">サムネイル画像 <span class="required-badge">必須</span></label>
                    <p class="form-hint">記事一覧・速報カードに表示される画像です。横長の画像がきれいに収まります。</p>
                    <div class="thumb-drop" id="thumbDrop">
                        <div class="thumb-drop-label" id="thumbDropLabel">クリックして画像を選択</div>
                    </div>
                    <input type="file" id="thumbInput" accept="image/*" style="display:none;">
                    <div class="thumb-required-note" id="thumbRequiredNote" style="display:none;">サムネイル画像を設定してください</div>
                </div>

                <!-- タイトル -->
                <div class="form-group">
                    <label class="form-label">見出し <span class="required-badge">必須</span></label>
                    <input type="text" class="form-input" id="articleTitle" placeholder="例: マンチェスター・シティが超大型補強を発表" maxlength="80">
                </div>

                <!-- 投稿記者 -->
                <div class="form-group">
                    <label class="form-label">投稿する記者名義 <span class="required-badge">必須</span></label>
                    <p class="form-hint">あなたが追加した記者、または担当している記者を選んでください</p>
                    <select class="form-select" id="authorSelect">
                        <option value="">読み込み中...</option>
                    </select>
                </div>

                <!-- カテゴリ -->
                <div class="form-group">
                    <label class="form-label">カテゴリ <span class="required-badge">必須</span></label>
                    <div class="tag-group" id="categoryTags">
                        <span class="tag-option" data-value="移籍情報">移籍情報</span>
                        <span class="tag-option" data-value="プレミアリーグ">プレミアリーグ</span>
                        <span class="tag-option" data-value="ラリーガ">ラリーガ</span>
                        <span class="tag-option" data-value="セリエA">セリエA</span>
                        <span class="tag-option" data-value="ブンデスリーガ">ブンデスリーガ</span>
                        <span class="tag-option" data-value="リーグアン">リーグアン</span>
                        <span class="tag-option" data-value="日本サッカー">日本サッカー</span>
                        <span class="tag-option" data-value="代表チーム">代表チーム</span>
                    </div>
                </div>

                <!-- 概要 -->
                <div class="form-group">
                    <label class="form-label">概要（一覧に表示される要約） <span class="required-badge">必須</span></label>
                    <textarea class="form-textarea" id="articleDesc" style="min-height:70px;" placeholder="1〜2文で内容を要約してください" maxlength="140"></textarea>
                </div>

                <!-- 本文 -->
                <div class="form-group">
                    <label class="form-label">本文 <span class="required-badge">必須</span></label>
                    <textarea class="form-textarea" id="articleContent" placeholder="記事の本文を入力してください"></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="window.location.href='gegen_press_category.html'">キャンセル</button>
                    <button type="submit" class="submit-btn" id="submitBtn">記事を投稿する</button>
                </div>
            </form>
        </div>

        <div class="success-message" id="successMessage">
            <h2>記事を投稿しました</h2>
            <p>記事が公開されました。トップページやカテゴリ一覧に表示されます。</p>
            <div class="success-actions">
                <button class="btn-view" id="viewArticleBtn">記事を見る</button>
                <button class="btn-another" id="addAnotherBtn">続けて投稿する</button>
            </div>
        </div>
    </div>

    <script src="api-client.js" onerror="console.warn('api-client.js が見つかりません')"></script>
    <script>
        const loginNotice = document.getElementById('loginNotice');
        const formCard = document.getElementById('formCard');
        const authorSelect = document.getElementById('authorSelect');
        let currentUserObj = null;
        let myReporters = []; // 自分が追加した記者 or 全記者（後述の方針）

        async function init() {
            if (typeof GegenPressAPI === 'undefined') {
                loginNotice.style.display = 'block';
                loginNotice.innerHTML = '記事投稿機能を読み込めませんでした。';
                formCard.style.display = 'none';
                return;
            }
            let user = null;
            try { user = await GegenPressAPI._currentUser(); } catch (e) {}
            if (!user) {
                loginNotice.style.display = 'block';
                formCard.style.display = 'none';
                return;
            }
            currentUserObj = user;

            // 記者選択肢を読み込む（全記者から選べるようにする。詳細はチャット内で説明）
            try {
                const res = await GegenPressAPI.reporters.getAll();
                myReporters = (res && res.success) ? (res.reporters || []) : [];
            } catch (e) { myReporters = []; }

            authorSelect.innerHTML = '<option value="">選択してください</option>' +
                myReporters.map(r => '<option value="' + r.id + '">' + escapeHtml(r.name) + '</option>').join('');
        }

        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // カテゴリタグ選択（単一選択）
        let selectedCategory = null;
        document.querySelectorAll('#categoryTags .tag-option').forEach(tag => {
            tag.addEventListener('click', function () {
                document.querySelectorAll('#categoryTags .tag-option').forEach(t => t.classList.remove('selected'));
                this.classList.add('selected');
                selectedCategory = this.getAttribute('data-value');
            });
        });

        // サムネイル選択・圧縮
        let thumbDataUrl = null;
        const thumbDrop = document.getElementById('thumbDrop');
        const thumbInput = document.getElementById('thumbInput');
        thumbDrop.addEventListener('click', () => thumbInput.click());
        thumbInput.addEventListener('change', async function () {
            const file = this.files && this.files[0];
            if (!file) return;
            if (!file.type || file.type.indexOf('image/') !== 0) { alert('画像ファイルを選択してください'); return; }
            document.getElementById('thumbDropLabel').textContent = '処理中...';
            try {
                thumbDataUrl = await fileToJpeg(file, 640);
                thumbDrop.classList.add('has-image');
                thumbDrop.innerHTML = '<img src="' + thumbDataUrl + '" alt="">';
                document.getElementById('thumbRequiredNote').style.display = 'none';
            } catch (e) {
                alert('画像の処理に失敗しました: ' + (e.message || e));
                document.getElementById('thumbDropLabel').textContent = 'クリックして画像を選択';
            }
        });
        function fileToJpeg(file, maxWidth) {
            return new Promise(function (resolve, reject) {
                const reader = new FileReader();
                reader.onerror = () => reject(new Error('ファイルを読み込めませんでした'));
                reader.onload = function () {
                    const img = new Image();
                    img.onerror = () => reject(new Error('画像として読み込めませんでした'));
                    img.onload = function () {
                        try {
                            const w = Math.min(img.width, maxWidth);
                            const h = Math.round(img.height * w / img.width);
                            const canvas = document.createElement('canvas');
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            let q = 0.82;
                            let out = canvas.toDataURL('image/jpeg', q);
                            while (out.length > 260000 && q > 0.4) { q -= 0.1; out = canvas.toDataURL('image/jpeg', q); }
                            if (out.length > 400000) { reject(new Error('画像が大きすぎます')); return; }
                            resolve(out);
                        } catch (e) { reject(e); }
                    };
                    img.src = reader.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 送信
        let lastCreatedId = null;
        document.getElementById('articleForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const title = document.getElementById('articleTitle').value.trim();
            const desc = document.getElementById('articleDesc').value.trim();
            const content = document.getElementById('articleContent').value.trim();
            const authorId = authorSelect.value;

            if (!thumbDataUrl) {
                document.getElementById('thumbRequiredNote').style.display = 'block';
                thumbDrop.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }
            if (!title) { alert('見出しを入力してください'); return; }
            if (!authorId) { alert('投稿する記者名義を選択してください'); return; }
            if (!selectedCategory) { alert('カテゴリを選択してください'); return; }
            if (!desc) { alert('概要を入力してください'); return; }
            if (!content) { alert('本文を入力してください'); return; }

            const rep = myReporters.find(r => r.id === authorId);
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '投稿中...';

            const res = await GegenPressAPI.articles.create({
                title: title,
                description: desc,
                content: content,
                category: selectedCategory,
                authorId: authorId,
                authorName: rep ? rep.name : '',
                authorScore: rep ? (rep.trustScore || 0) : 0,
                image: thumbDataUrl,
                averageRating: 0,
                trustScore: rep ? (rep.trustScore || 0) : 0
            });

            submitBtn.disabled = false;
            submitBtn.textContent = '記事を投稿する';

            if (res && res.success) {
                lastCreatedId = res.article && res.article.id;
                formCard.style.display = 'none';
                document.getElementById('successMessage').classList.add('show');
            } else {
                alert((res && res.message) || '投稿に失敗しました');
            }
        });

        document.getElementById('viewArticleBtn').addEventListener('click', () => {
            window.location.href = lastCreatedId
                ? 'gegen_press_article_detail.html?id=' + encodeURIComponent(lastCreatedId)
                : 'gegen_press_category.html';
        });
        document.getElementById('addAnotherBtn').addEventListener('click', () => {
            window.location.reload();
        });

        init();
    </script>
</body>
</html>
