<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>検索結果 | Gegen Press!</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        
            font-size: 13px;
        }

        /* ヘッダー */
        header {
            background: linear-gradient(135deg, #fff 0%, #f9f9f9 100%);
            border-bottom: 3px solid #e63946;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(230, 57, 70, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 36px;
            font-weight: 900;
            color: #e63946;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .header-nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-link {
            color: #333;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #e63946;
        }

        .back-button {
            background-color: #e63946;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background-color: #ff6b6b;
        }

        /* 検索ヘッダー */
        .search-header {
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            padding: 60px 40px;
            position: relative;
            overflow: hidden;
        }

        .search-header::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -100px;
            width: 400px;
            height: 400px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .search-header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .search-box {
            background-color: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            padding: 15px 20px;
            font-size: 16px;
            color: #fff;
            width: 100%;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-box:focus {
            outline: none;
            border-color: #fff;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .search-info {
            font-size: 18px;
            opacity: 0.95;
            margin-top: 15px;
            color: #fff;
        }

        .search-result-count {
            font-weight: bold;
            color: #fff;
        }

        /* コンテナ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 40px;
        }

        /* サイドバー */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .filter-box {
            background: linear-gradient(135deg, #fff 0%, #f9f9f9 100%);
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
        }

        .filter-box h3 {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #e63946;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-option {
            margin-bottom: 12px;
        }

        .filter-option label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: color 0.3s ease;
            color: #333;
        }

        .filter-option label:hover {
            color: #e63946;
        }

        .filter-option input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #e63946;
        }

        /* メインコンテンツ */
        .main-content {
            display: flex;
            flex-direction: column;
        }

        .sort-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }

        .sort-label {
            font-size: 13px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sort-select {
            background-color: #fff;
            border: 2px solid #ddd;
            color: #333;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .sort-select:hover {
            border-color: #e63946;
        }

        .sort-select:focus {
            outline: none;
            border-color: #e63946;
        }

        /* 検索結果 */
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .result-item {
            background: linear-gradient(135deg, #fff 0%, #f9f9f9 100%);
            border: 2px solid #ddd;
            border-left: 4px solid #e63946;
            border-radius: 6px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .result-item:hover {
            border-color: #e63946;
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.1);
            transform: translateX(5px);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .result-title {
            font-size: 18px;
            font-weight: bold;
            color: #000;
            margin-bottom: 8px;
        }

        .result-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .result-author {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #333;
        }

        .author-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
        }

        .result-time {
            font-size: 12px;
            color: #999;
        }

        .result-score {
            background-color: #e63946;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
        }

        .result-description {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .result-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .result-tag {
            background-color: rgba(230, 57, 70, 0.1);
            color: #e63946;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid #e63946;
            cursor: pointer;
        }

        .result-footer {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #ddd;
            padding-top: 12px;
        }

        /* ページネーション */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pagination-btn {
            background-color: #fff;
            color: #333;
            border: 2px solid #ddd;
            padding: 12px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .pagination-btn:hover {
            border-color: #e63946;
            color: #e63946;
        }

        .pagination-btn.active {
            background-color: #e63946;
            border-color: #e63946;
            color: #fff;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

            .container {

            .container {

            }

                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .result-header {
                flex-direction: column;
                gap: 10px;
            }

    <script>
        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function getInitials(name) {
            if (!name) return '?';
            const parts = String(name).trim().split(/\s+/).filter(p => /[A-Za-z0-9\u00C0-\u024F]/.test(p.charAt(0)));
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            const one = parts[0] || String(name).trim();
            return one.substring(0, 2).toUpperCase();
        }
        const AVATAR_PALETTE = [
            ['#e63946', '#a4161a'], ['#1d3557', '#14213d'], ['#2a9d8f', '#1f7a6f'],
            ['#e76f51', '#c44a30'], ['#6a4c93', '#4e3470'], ['#457b9d', '#2f5a73'],
            ['#588157', '#3a5a3a'], ['#bc6c25', '#8a4e16']
        ];
        function avatarColor(name) {
            let h = 0; const s = name || '';
            for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
            return AVATAR_PALETTE[h % AVATAR_PALETTE.length];
        }
        function avatarStyle(name) {
            const g = avatarColor(name);
            return 'background: linear-gradient(135deg, ' + g[0] + ' 0%, ' + g[1] + ' 100%); color:#fff;';
        }
        function fmtDate(ts) {
            try {
                const d = ts && ts.toDate ? ts.toDate() : (ts ? new Date(ts) : null);
                if (!d || isNaN(d)) return '';
                return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日 ' +
                    String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
            } catch (e) { return ''; }
        }

        // フィルターのチェックボックスは今回未配線（見た目のみ・準備中）
        document.querySelectorAll('.filter-option input').forEach(checkbox => {
            checkbox.disabled = true;
        });

        // 検索欄・ソート
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const resultsList = document.getElementById('resultsList');
        const resultCount = document.getElementById('resultCount');

        searchInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const q = this.value.trim();
                const url = new URL(window.location.href);
                if (q) url.searchParams.set('q', q); else url.searchParams.delete('q');
                window.location.href = url.toString();
            }
        });
        sortSelect.addEventListener('change', function () {
            renderResults(currentResults, this.value);
        });

        function goArticle(id) {
            window.location.href = 'gegen_press_article_detail.html?id=' + encodeURIComponent(id);
        }

        let currentResults = [];

        function sortResults(list, mode) {
            const arr = list.slice();
            if (mode === '信頼度が高い順') {
                arr.sort((a, b) => (b.trustScore || 0) - (a.trustScore || 0));
            } else if (mode === '人気順') {
                arr.sort((a, b) => (b.views || 0) - (a.views || 0));
            } else { // 最新順・関連度順（データ上は投稿日時順で代用）
                arr.sort((a, b) => {
                    const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
                    const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
                    return tb - ta;
                });
            }
            return arr;
        }

        function renderResults(list, sortMode) {
            const sorted = sortResults(list, sortMode || sortSelect.value);
            resultCount.textContent = sorted.length + '件';
            const pg = document.querySelector('.pagination');
            if (pg) pg.style.display = 'none'; // 見せかけのページ送りは実データ表示時には隠す

            if (sorted.length === 0) {
                resultsList.innerHTML = '<p style="color:#999; padding:20px 0;">該当するニュースが見つかりませんでした。</p>';
                return;
            }
            resultsList.innerHTML = sorted.map(a => {
                const rating = (typeof a.averageRating === 'number') ? a.averageRating.toFixed(1) : '-';
                const tags = (a.tags || []).slice(0, 4).map(t =>
                    '<span class="result-tag" onclick="event.stopPropagation(); window.location.href=\'gegen_press_hashtag.html?tag=' + encodeURIComponent(t) + '\';">#' + esc(t) + '</span>'
                ).join('');
                return (
                    '<div class="result-item" style="cursor:pointer;" data-id="' + esc(a.id) + '">' +
                        '<div class="result-header">' +
                            '<div>' +
                                '<div class="result-title">' + esc(a.title) + '</div>' +
                                '<div class="result-meta">' +
                                    '<div class="result-author">' +
                                        '<div class="author-avatar" style="' + avatarStyle(a.authorName) + '">' + esc(getInitials(a.authorName)) + '</div>' +
                                        '<span>' + esc(a.authorName || '') + '</span>' +
                                    '</div>' +
                                    '<span class="result-time">' + esc(fmtDate(a.createdAt)) + '</span>' +
                                '</div>' +
                            '</div>' +
                            '<div class="result-score">' + (a.trustScore || 0) + '/100</div>' +
                        '</div>' +
                        '<div class="result-description">' + esc(a.description || '') + '</div>' +
                        '<div class="result-tags">' + tags + '</div>' +
                        '<div class="result-footer">' +
                            '<span>閲覧数: ' + (a.views || 0).toLocaleString() + '</span>' +
                            '<span>評価: ' + rating + '/5.0</span>' +
                        '</div>' +
                    '</div>'
                );
            }).join('');
            resultsList.querySelectorAll('.result-item').forEach(el => {
                el.addEventListener('click', () => goArticle(el.getAttribute('data-id')));
            });
        }

        async function runSearch() {
            if (typeof GegenPressAPI === 'undefined') {
                resultsList.innerHTML = '<p style="color:#999; padding:20px 0;">検索機能を読み込めませんでした。</p>';
                return;
            }
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q') || '';
            searchInput.value = q;

            try {
                const res = q
                    ? await GegenPressAPI.articles.search(q)
                    : await GegenPressAPI.articles.getAll();
                if (!res || !res.success) {
                    resultsList.innerHTML = '<p style="color:#999; padding:20px 0;">検索に失敗しました。</p>';
                    return;
                }
                currentResults = res.articles || [];
                renderResults(currentResults);
            } catch (e) {
                resultsList.innerHTML = '<p style="color:#999; padding:20px 0;">検索中にエラーが発生しました。</p>';
            }
        }

        runSearch();
    </script>
    </script>
</body>
</html>
