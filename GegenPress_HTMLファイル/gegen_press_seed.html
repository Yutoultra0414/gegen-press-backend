<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gegen Press! - 初期データ投入（管理用）</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            background: #f5f5f5; color: #333;
            display: flex; justify-content: center; padding: 40px 16px;
        }
        .card {
            background: #fff; border-radius: 12px; padding: 32px;
            max-width: 560px; width: 100%;
            box-shadow: 0 4px 16px rgba(0,0,0,.08);
        }
        h1 { font-size: 22px; margin-bottom: 6px; color: #e63946; }
        p.desc { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.7; }
        .section { margin-bottom: 24px; }
        .section h2 { font-size: 15px; margin-bottom: 10px; border-left: 4px solid #e63946; padding-left: 8px; }
        input {
            width: 100%; padding: 10px 12px; margin-bottom: 8px;
            border: 1px solid #ddd; border-radius: 6px; font-size: 14px;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 8px;
        }
        .btn-red { background: #e63946; color: #fff; }
        .btn-red:disabled { background: #e5a0a6; cursor: default; }
        .btn-white { background: #fff; color: #333; border: 1px solid #ccc; }
        #status { font-size: 13px; padding: 10px 12px; border-radius: 6px; background: #f0f0f0; margin-bottom: 12px; }
        #log {
            font-size: 12px; line-height: 1.9; background: #1d1d1d; color: #d7ffd7;
            border-radius: 6px; padding: 12px; min-height: 120px; max-height: 320px;
            overflow-y: auto; white-space: pre-wrap; font-family: Consolas, monospace;
        }
        .note { font-size: 12px; color: #999; margin-top: 16px; line-height: 1.7; }
    </style>
</head>
<body>
<div class="card">
    <h1>初期データ投入（管理用）</h1>
    <p class="desc">Firestore に記者6件・記事6件のサンプルデータを投入します。投入にはログインが必要です。作業が終わったら、このファイルは削除して構いません。</p>

    <div class="section">
        <h2>1. ログイン</h2>
        <div id="status">確認中...</div>
        <button class="btn-white" id="googleBtn">Google でログイン</button>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード">
        <button class="btn-white" id="emailBtn">メールでログイン</button>
    </div>

    <div class="section">
        <h2>2. データ投入</h2>
        <button class="btn-red" id="seedBtn" disabled>サンプルデータを投入する</button>
        <div id="log">ここに実行ログが表示されます。</div>
    </div>

    <div class="note">
        投入されるデータ: 記者 rep_fabrizio / rep_skysports / rep_marca / rep_goal / rep_as / rep_calcio、記事 art_001〜art_006。<br>
        すでに投入済みの場合、上書きはセキュリティルールにより拒否されます（エラーになりますが正常です）。
    </div>
</div>

<script src="api-client.js"></script>
<script>
const reporters = [
  { id:'rep_fabrizio', name:'Fabrizio Romano', mediaOutlet:'移籍情報スペシャリスト', bio:'世界中の移籍情報をいち早く届ける、移籍報道の第一人者。', expertise:['移籍情報','プレミアリーグ','セリエA'], twitterHandle:'@FabrizioRomano', trustScore:96, articlesCount:284, averageRating:4.8, followers:1200000, isVerified:true },
  { id:'rep_skysports', name:'Sky Sports', mediaOutlet:'プレミアリーグ専門', bio:'プレミアリーグを中心に、確かな取材力で速報を届ける。', expertise:['プレミアリーグ','代表チーム'], twitterHandle:'@SkySportsNews', trustScore:92, articlesCount:512, averageRating:4.6, followers:980000, isVerified:true },
  { id:'rep_marca', name:'Marca Sports', mediaOutlet:'スペイン情報', bio:'スペインサッカーの総本山。ラリーガの最新動向に強い。', expertise:['ラリーガ','移籍情報'], twitterHandle:'@marca', trustScore:88, articlesCount:430, averageRating:4.4, followers:760000, isVerified:true },
  { id:'rep_goal', name:'Goal.com', mediaOutlet:'ヨーロッパ全域対応', bio:'欧州各国リーグを幅広くカバーする総合サッカーメディア。', expertise:['プレミアリーグ','ラリーガ','セリエA','ブンデスリーガ'], twitterHandle:'@goal', trustScore:81, articlesCount:645, averageRating:4.1, followers:540000, isVerified:true },
  { id:'rep_as', name:'AS España', mediaOutlet:'ラリーガ・スペイン', bio:'レアル・マドリーやバルセロナの一次情報に定評。', expertise:['ラリーガ','代表チーム'], twitterHandle:'@diarioas', trustScore:85, articlesCount:388, averageRating:4.3, followers:620000, isVerified:true },
  { id:'rep_calcio', name:'Calcio & Calcetti', mediaOutlet:'セリエA専門', bio:'イタリアンフットボールの専門家。セリエAの動向に精通。', expertise:['セリエA'], twitterHandle:'@calciomercato', trustScore:78, articlesCount:167, averageRating:4.2, followers:210000, isVerified:false }
];
const articles = [
  { id:'art_001', title:'マンチェスター・シティが超大型補強を発表', authorId:'rep_fabrizio', category:'移籍情報', description:'プレミアリーグの雄、マンチェスター・シティが2024-25シーズンに向けた大規模な補強計画を発表しました。', content:'プレミアリーグの雄、マンチェスター・シティが2024-25シーズンに向けた大規模な補強計画を発表しました。複数の欧州トップリーグの有力選手が加入予定となっており、来季のさらなる戦力強化が期待されます。', tags:['マンチェスター・シティ','補強','プレミアリーグ'], views:2450, likes:320, commentsCount:156, averageRating:4.8, trustScore:96 },
  { id:'art_002', title:'ユナイテッド、レアル・マドリーのスター選手を獲得か', authorId:'rep_fabrizio', category:'移籍情報', description:'マンチェスター・ユナイテッドが、レアル・マドリーのスター選手との契約交渉に進むという最新情報。', content:'マンチェスター・ユナイテッドが、レアル・マドリーのスター選手との契約交渉に進むという最新情報が入ってきました。複数のソースから確認されています。', tags:['マンチェスター・ユナイテッド','レアル・マドリー','移籍'], views:1892, likes:240, commentsCount:98, averageRating:4.7, trustScore:94 },
  { id:'art_003', title:'PSG、フランス代表MFの争奪戦に勝利', authorId:'rep_fabrizio', category:'移籍情報', description:'パリ・サンジェルマンが、フランス代表の有望なMFの獲得に成功しました。', content:'パリ・サンジェルマンが、フランス代表の有望なMFの獲得に成功しました。複数のビッグクラブからのオファーを制しての獲得となります。', tags:['PSG','リーグアン','移籍'], views:3267, likes:410, commentsCount:203, averageRating:4.9, trustScore:95 },
  { id:'art_004', title:'レアル・マドリー、日本の若き才能に興味', authorId:'rep_marca', category:'ラリーガ', description:'レアル・マドリーが日本人の若手選手に注目しているとの報道。', content:'レアル・マドリーが日本人の若手選手に注目しているとの報道がありました。今後の移籍市場での動きが注目されます。', tags:['レアル・マドリー','日本','ラリーガ'], views:856, likes:130, commentsCount:54, averageRating:4.5, trustScore:88 },
  { id:'art_005', title:'シティとユナイテッド、プレミア優勝争いは接戦へ', authorId:'rep_skysports', category:'プレミアリーグ', description:'プレミアリーグの優勝争いが今季も激しさを増しています。', content:'プレミアリーグの優勝争いが今季も激しさを増しています。マンチェスターの2クラブを中心に、目が離せない展開が続いています。', tags:['プレミアリーグ','優勝争い'], views:3120, likes:380, commentsCount:167, averageRating:4.6, trustScore:92 },
  { id:'art_006', title:'ユベントス、イタリア代表CBを獲得', authorId:'rep_calcio', category:'セリエA', description:'ユベントスが、イタリア代表の主力ディフェンダーの獲得を発表。', content:'ユベントスが、イタリア代表の主力ディフェンダーの獲得を発表。セリエAの最強ディフェンス構築に向けた重要な一手となります。', tags:['ユベントス','セリエA','移籍'], views:2145, likes:210, commentsCount:88, averageRating:4.5, trustScore:85 }
];

const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');
const seedBtn = document.getElementById('seedBtn');
function log(msg) { logEl.textContent += '\n' + msg; logEl.scrollTop = logEl.scrollHeight; }

async function refreshStatus() {
    try {
        const u = await GegenPressAPI._currentUser();
        if (u) {
            statusEl.textContent = 'ログイン中: ' + (u.email || u.displayName || u.uid);
            seedBtn.disabled = false;
        } else {
            statusEl.textContent = '未ログインです。Googleまたはメールでログインしてください。';
            seedBtn.disabled = true;
        }
    } catch (e) {
        statusEl.textContent = 'Firebase接続エラー: ' + e;
    }
}
refreshStatus();

document.getElementById('googleBtn').addEventListener('click', async () => {
    const res = await GegenPressAPI.auth.loginWithGoogle();
    if (!res.success) alert(res.message || 'ログインに失敗しました');
    refreshStatus();
});
document.getElementById('emailBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('password').value;
    if (!email || !pw) { alert('メールアドレスとパスワードを入力してください'); return; }
    const res = await GegenPressAPI.auth.login(email, pw);
    if (!res.success) alert(res.message || 'ログインに失敗しました');
    refreshStatus();
});

seedBtn.addEventListener('click', async () => {
    seedBtn.disabled = true;
    seedBtn.textContent = '投入中...';
    logEl.textContent = '投入を開始します。';
    try {
        const db = await GegenPressAPI._db();
        const now = firebase.firestore.FieldValue.serverTimestamp();

        log('[1/2] 記者データを投入中...');
        for (const r of reporters) {
            const { id, ...data } = r;
            try {
                await db.collection('reporters').doc(id).set({
                    ...data, profileImage: null, createdBy: null, source: 'official',
                    createdAt: now, updatedAt: now
                });
                log('  OK  ' + r.name + ' (' + id + ')');
            } catch (e) {
                log('  NG  ' + r.name + ' : ' + (e.code || e.message || e));
            }
        }

        log('[2/2] 記事データを投入中...');
        for (const a of articles) {
            const { id, authorId, ...data } = a;
            const rep = reporters.find(r => r.id === authorId);
            try {
                await db.collection('articles').doc(id).set({
                    ...data, authorId, authorName: rep ? rep.name : '不明',
                    authorScore: rep ? rep.trustScore : 80,
                    image: null, isPublished: true,
                    createdAt: now, updatedAt: now
                });
                log('  OK  ' + a.title + ' (' + id + ')');
            } catch (e) {
                log('  NG  ' + a.title + ' : ' + (e.code || e.message || e));
            }
        }
        log('完了しました。トップページやランキングで確認してください。');
    } catch (e) {
        log('エラー: ' + e);
    }
    seedBtn.textContent = 'サンプルデータを投入する';
    seedBtn.disabled = false;
});
</script>
</body>
</html>
