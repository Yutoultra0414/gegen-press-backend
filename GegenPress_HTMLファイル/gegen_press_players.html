<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選手一覧 - Gegen Press!</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Hiragino Sans', 'Meiryo', 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

        header {
            background: linear-gradient(135deg, #fff 0%, #f9f9f9 100%);
            border-bottom: 3px solid #e63946;
            padding: 14px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { display: flex; align-items: center; text-decoration: none; }
        .header-nav { display: flex; gap: 18px; align-items: center; }
        .nav-link { color: #333; text-decoration: none; font-weight: 600; font-size: 14px; }
        .nav-link:hover { color: #e63946; }
        .back-button { background: #e63946; color: #fff; border: none; padding: 9px 18px; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer; text-decoration: none; }

        .page-title-section {
            background: linear-gradient(135deg, #e63946 0%, #a4161a 100%);
            padding: 20px 40px;
        }
        .page-title { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 4px; }
        .page-subtitle { font-size: 12px; color: #fff; opacity: 0.9; }

        .container { max-width: 1000px; margin: 0 auto; padding: 24px 40px; }

        .add-cta {
            display: flex; align-items: center; justify-content: space-between;
            background: #fff; border: 2px dashed #e63946; border-radius: 8px;
            padding: 14px 18px; margin-bottom: 20px; font-size: 13px; color: #666;
        }
        .add-cta a {
            background: #e63946; color: #fff; text-decoration: none; padding: 8px 16px;
            border-radius: 6px; font-weight: bold; font-size: 13px; white-space: nowrap;
        }

        .players-list { border: 1px solid #e3e3e3; border-radius: 6px; overflow: hidden; }
        .player-row {
            display: flex; align-items: center; gap: 12px; padding: 10px 14px;
            background: #fff; border-bottom: 1px solid #eee; cursor: pointer; transition: background .15s ease;
        }
        .player-row:last-child { border-bottom: none; }
        .player-row:nth-child(even) { background: #fafafa; }
        .player-row:hover { background: #fdecec; }
        .player-row-avatar {
            width: 42px; height: 42px; border-radius: 6px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 13px; font-weight: 900; overflow: hidden;
        }
        .player-row-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .player-row-name { flex: 1; min-width: 0; }
        .player-row-name h3 { font-size: 14px; color: #1a0dab; margin-bottom: 2px; }
        .player-row-name p { font-size: 12px; color: #888; }
        .player-row-club { width: 140px; font-size: 12px; color: #555; flex-shrink: 0; text-align: right; }
        .transfer-badge {
            font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px;
            flex-shrink: 0; white-space: nowrap;
        }
        .transfer-badge.rumor { background: #fff3cd; color: #856404; }
        .transfer-badge.completed { background: #d4edda; color: #155724; }

        .empty-note { padding: 30px; text-align: center; color: #999; font-size: 14px; }

        @media (max-width: 768px) {
            header { padding: 8px 14px; }
            .logo img { height: 26px !important; }
            .nav-link, .back-button { font-size: 12px !important; padding: 4px 8px !important; }
            .page-title-section { padding: 14px 16px; }
            .page-title { font-size: 18px; }
            .container { padding: 16px; }
            .player-row-club { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <a href="gegen_press_top.html" class="logo"><img src="logo.png" alt="Gegen Press!" style="height:46px;width:auto;display:block;"></a>
        <div class="header-nav">
            <a href="gegen_press_top.html" class="nav-link">ホーム</a>
            <a href="gegen_press_ranking.html" class="nav-link">記者ランキング</a>
            <a href="gegen_press_top.html" class="back-button">トップに戻る</a>
        </div>
    </header>

    <section class="page-title-section">
        <h1 class="page-title">選手一覧</h1>
        <p class="page-subtitle">登録されている選手と移籍情報</p>
    </section>

    <div class="container">
        <div class="add-cta">
            <span>探している選手が見つからない？あなたが追加できます。</span>
            <a href="gegen_press_add_player.html">選手を追加</a>
        </div>
        <div class="players-list" id="playersList">
            <div class="empty-note">読み込み中...</div>
        </div>
    </div>

    <script src="api-client.js" onerror="console.warn('api-client.js 未読込')"></script>
    <script>
        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function getInitials(name) {
            if (!name) return '?';
            const parts = String(name).trim().split(/\s+/).filter(p => /[A-Za-z0-9\u00C0-\u024F\u3040-\u30FF\u4E00-\u9FFF]/.test(p.charAt(0)));
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            return String(name).trim().substring(0, 2).toUpperCase();
        }
        const PALETTE = [
            ['#e63946', '#a4161a'], ['#1d3557', '#14213d'], ['#2a9d8f', '#1f7a6f'],
            ['#e76f51', '#c44a30'], ['#6a4c93', '#4e3470'], ['#457b9d', '#2f5a73']
        ];
        function colorFor(name) {
            let h = 0; const s = name || '';
            for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
            return PALETTE[h % PALETTE.length];
        }

        async function loadPlayers() {
            const list = document.getElementById('playersList');
            if (typeof GegenPressAPI === 'undefined') {
                list.innerHTML = '<div class="empty-note">選手情報を読み込めませんでした。</div>';
                return;
            }
            try {
                const res = await GegenPressAPI.players.getAll();
                if (!res || !res.success || !res.players || res.players.length === 0) {
                    list.innerHTML = '<div class="empty-note">まだ選手が登録されていません。「選手を追加」から最初の1人を登録してみましょう。</div>';
                    return;
                }
                list.innerHTML = res.players.map(p => {
                    const g = colorFor(p.name);
                    const avatar = p.profileImage
                        ? '<img src="' + p.profileImage + '" alt="">'
                        : esc(getInitials(p.name));
                    const avatarStyle = p.profileImage ? '' : ('background: linear-gradient(135deg, ' + g[0] + ' 0%, ' + g[1] + ' 100%);');
                    let badge = '';
                    if (p.transferStatus === 'rumor') badge = '<span class="transfer-badge rumor">移籍の噂</span>';
                    else if (p.transferStatus === 'completed') badge = '<span class="transfer-badge completed">移籍決定</span>';
                    return (
                        '<div class="player-row" data-id="' + esc(p.id) + '">' +
                            '<div class="player-row-avatar" style="' + avatarStyle + '">' + avatar + '</div>' +
                            '<div class="player-row-name">' +
                                '<h3>' + esc(p.name) + '</h3>' +
                                '<p>' + esc(p.position || '') + (p.nationality ? ' ・ ' + esc(p.nationality) : '') + '</p>' +
                            '</div>' +
                            badge +
                            '<div class="player-row-club">' + esc(p.currentClub || '') + '</div>' +
                        '</div>'
                    );
                }).join('');
                list.querySelectorAll('.player-row').forEach(el => {
                    el.addEventListener('click', () => {
                        window.location.href = 'gegen_press_player_profile.html?id=' + encodeURIComponent(el.getAttribute('data-id'));
                    });
                });
            } catch (e) {
                list.innerHTML = '<div class="empty-note">読み込み中にエラーが発生しました。</div>';
            }
        }
        loadPlayers();
    </script>
</body>
</html>
